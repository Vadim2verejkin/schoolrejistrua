<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Державний освітній реєстр</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(180deg, #0a1f44, #102a5c, #0a1f44);
      color: #eaf6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 500px;
      padding: 30px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .coat {
      font-size: 40px;
      margin-bottom: 5px;
    }

    .header {
      font-size: 18px;
      font-weight: bold;
    }

    .sub {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1e90ff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3aa0ff;
    }

    .progress {
      margin-top: 15px;
      height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #00c6ff;
    }

    .result {
      margin-top: 20px;
      text-align: left;
      font-size: 13px;
      line-height: 1.6;
      color: #00ffcc;
      white-space: pre-line;
    }

    .stamp {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 100px;
      height: 100px;
      border: 2px solid rgba(255,0,0,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: rgba(255,0,0,0.6);
      transform: rotate(-20deg);
      opacity: 0.6;
    }

    .footer {
      margin-top: 10px;
      font-size: 11px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="coat">🇺🇦🛡️</div>
  <div class="header">Державний освітній реєстр</div>
  <div class="sub">Єдина база даних учнів України • Захищений доступ</div>

  <input type="text" id="name" placeholder="Введіть ім'я, нік або ID...">
  <button onclick="search()">Запит до реєстру</button>

  <div class="progress" id="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="result" id="result"></div>

  <div class="stamp">ПЕРЕВІРЕНО<br>EDU GOV</div>

  <div class="footer">Рівень доступу: Адміністратор • EDU-GOV v5.1</div>
</div>

<script>
function search() {
  const name = document.getElementById('name').value;
  const result = document.getElementById('result');
  const progress = document.getElementById('progress');
  const bar = document.getElementById('bar');

  if (name.trim() === "") {
    result.innerHTML = "❌ Введіть дані";
    return;
  }

  result.innerHTML = "";
  progress.style.display = "block";
  bar.style.width = "0%";

  let percent = 0;
  let interval = setInterval(() => {
    percent += Math.random() * 12;
    if (percent >= 100) {
      percent = 100;
      clearInterval(interval);

      setTimeout(() => {
        const randomIP = `192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
        const lastSeen = `${Math.floor(Math.random()*23)}:${Math.floor(Math.random()*59).toString().padStart(2,'0')}`;

        result.innerHTML = `
✅ ДОСТУП НАДАНО

👤 Нік: @${name}
🆔 ID: ${Math.floor(Math.random()*1000000000)}
🏫 Заклад освіти: Школа номер 7
📚 Клас: 5 клас
📱 Статус: Онлайн
⏱ Остання активність: ${lastSeen}

🌍 Країна: Україна
📍 Місто: Терновка
🌐 IP-адреса: ${randomIP}
🛰 Провайдер: UkrNet

📞 Телефон: +380${Math.floor(Math.random()*1000000000)}
📧 Email: ${name}@gmail.com

📊 Рейтинг учня: ${Math.floor(Math.random()*100)} / 100
⚠️ Порушення: ${Math.floor(Math.random()*3)}
🔒 Рівень доступу: Середній

⚙️ СИСТЕМА: Моніторинг активний`;
      }, 400);
    }
    bar.style.width = percent + "%";
  }, 200);
}
</script>

</body>
</html>
